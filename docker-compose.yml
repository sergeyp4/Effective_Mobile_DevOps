services:
  backend:
    container_name: python-backend
    build: ./backend
    restart: unless-stopped
    # ports:
    #   - 8080:8080
  nginx:
    container_name: nginx-revers-proxy
    image: nginx:latest
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80
    restart: unless-stopped
networks:
  app-network:
    driver: bridge