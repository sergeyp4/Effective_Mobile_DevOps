services:
  backend:
    container_name: backend
    build: ./backend
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  nginx:
    container_name: nginx-reverse-proxy
    image: nginxinc/nginx-unprivileged:1.29-alpine-slim
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:8080
    restart: unless-stopped
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
networks:
  app-network:
    driver: bridge